  hermes-lane10_favopen:
    <<: *bot-common
    container_name: hermes-lane10_favopen
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: lane10_favopen
      HERMES_MAKER_MODE: "1"
      HERMES_PURE_MODE: "1"
      MARKET_FILTER: btc15
      HERMES_STRATEGY_VARIANT: fav_cont_open
      HERMES_LOG_DIR: /app/logs/lane10_favopen
      HERMES_PAPER_DIR: /app/data/paper/lane10_favopen
      HERMES_HANDOFF_DIR: /app/data/handoff/lane10_favopen
