      - ./data:/app/data
      - ./logs/lane10_favopen:/app/logs/lane10_favopen
      - ./artifacts/lane10_favopen:/app/artifacts/lane10_favopen
      - ./config:/app/config:ro

  dashboard:
    build: .
    image: hermes-paper:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["scripts/docker_entrypoint_dashboard.sh"]
    env_file:
      - .env
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_LOG_DIR: /app/logs
      STREAMLIT_SERVER_BASE_URL_PATH: dashboard
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.streamlit:/app/.streamlit:ro
      - ./config:/app/config:ro
    expose:
      - "8501"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8501/dashboard/_stcore/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      hermes-lane01_baseline:
        condition: service_started
      hermes-lane02_autonomy:
        condition: service_started
      hermes-lane03_drift:
        condition: service_started
      hermes-lane04_favcont70:
        condition: service_started
      hermes-lane05_favsniper:
        condition: service_started
      hermes-lane06_garch:
        condition: service_started
      hermes-lane07_ethdrift:
        condition: service_started
      hermes-lane08_favdepth:
        condition: service_started
      hermes-lane09_random:
        condition: service_started
      hermes-lane10_favopen:
        condition: service_started
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "${HERMES_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  hermes:
    driver: bridge
