      HERMES_INSTANCE_ID: lane05_favsniper
      HERMES_MAKER_MODE: "1"
      HERMES_PURE_MODE: "1"
      MARKET_FILTER: btc15
      HERMES_STRATEGY_VARIANT: fav_sniper
      HERMES_LOG_DIR: /app/logs/lane05_favsniper
      HERMES_PAPER_DIR: /app/data/paper/lane05_favsniper
      HERMES_HANDOFF_DIR: /app/data/handoff/lane05_favsniper
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/lane05_favsniper:/app/logs/lane05_favsniper
      - ./artifacts/lane05_favsniper:/app/artifacts/lane05_favsniper
      - ./config:/app/config:ro

  hermes-lane06_garch:
    <<: *bot-common
    container_name: hermes-lane06_garch
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: lane06_garch
      HERMES_PURE_MODE: "1"
      MARKET_FILTER: btc15
      HERMES_STRATEGY_VARIANT: garch_sigma
      HERMES_LOG_DIR: /app/logs/lane06_garch
      HERMES_PAPER_DIR: /app/data/paper/lane06_garch
