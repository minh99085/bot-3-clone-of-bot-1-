  hermes-lane04_favcont70:
    <<: *bot-common
    container_name: hermes-lane04_favcont70
    # Paused 2026-07-22: longshot book ~8% WR / large neg PnL vs random control.
    # Kept in compose (dashboard depends_on) but does not trade: sleep loop.
    restart: "no"
    command: ["bash", "-c", "echo longshot lane paused; sleep infinity"]
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: lane04_favcont70
      HERMES_MAKER_MODE: "1"
      HERMES_PURE_MODE: "1"
      MARKET_FILTER: btc15
      HERMES_STRATEGY_VARIANT: fav_cont_70
      HERMES_PAUSE_VARIANTS: longshot_only
      HERMES_MIN_SIDE_PRICE: "0.25"
      HERMES_LOG_DIR: /app/logs/lane04_favcont70
      HERMES_PAPER_DIR: /app/data/paper/lane04_favcont70
      HERMES_HANDOFF_DIR: /app/data/handoff/lane04_favcont70
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
