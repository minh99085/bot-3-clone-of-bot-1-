      HERMES_PAPER_DIR: /app/data/paper/lane02_autonomy
      HERMES_HANDOFF_DIR: /app/data/handoff/lane02_autonomy
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
