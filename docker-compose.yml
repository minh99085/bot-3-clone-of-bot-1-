# Hermes v2 Paper — 10-lane btc-updown-15m experiment (paired A/B design)
# All lanes trade the SAME market (BTC 15m Up/Down), one strategy variant per
# lane, so every window is a paired sample: lane-vs-lane differences are pure
# strategy signal. Controls: lane08 legacy ensemble (must lose), lane09
# deterministic random side (venue cost baseline every lane must beat).
#
# Registry v2 (2026-07-23): the driftless barrier's cheap-side fades ran
# 2.8% WR over 72 tickets (fair ~20%) — an anti-signal. Losing lanes retired;
# the fav_cont family buys the >=0.70/0.80 favorite only when intra-window
# drift agrees; drift lanes price the barrier WITH the drift term.
#
# B1 confound removal: every q-mode lane runs HERMES_PURE_MODE=1 (fixed
# sizing, bandit/lessons/risk-pause/autonomy DISABLED) so lanes differ ONLY
# in q. Exception: lane02_autonomy = same barrier q as lane01 with the FULL
# adaptive stack on — the pure-vs-autonomy A/B that measures whether the
# autonomy layer adds or destroys value. Let the data decide.
# $2,000 paper per lane (config bankroll) = $20k paper fleet. Scoreboard: scripts/lane_scoreboard.py
#
# Start everything:
#   docker compose up -d --build

name: hermes-paper

x-bot-common: &bot-common
  build: .
  image: hermes-paper:latest
  restart: unless-stopped
  command: ["scripts/docker_entrypoint_bot.sh"]
  env_file:
    - .env
  expose:
    - "8080"
  healthcheck:
    test: ["CMD", "scripts/healthcheck_bot.sh"]
    interval: 60s
    timeout: 10s
    retries: 3
    start_period: 90s
  networks:
    - hermes
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:
  hermes-lane01_baseline:
    <<: *bot-common
    container_name: hermes-lane01_baseline
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: lane01_baseline
      HERMES_PURE_MODE: "1"
      MARKET_FILTER: btc15
      HERMES_STRATEGY_VARIANT: baseline
      HERMES_LOG_DIR: /app/logs/lane01_baseline
      HERMES_PAPER_DIR: /app/data/paper/lane01_baseline
      HERMES_HANDOFF_DIR: /app/data/handoff/lane01_baseline
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/lane01_baseline:/app/logs/lane01_baseline
      - ./artifacts/lane01_baseline:/app/artifacts/lane01_baseline
      - ./config:/app/config:ro

  hermes-lane02_autonomy:
