      - ./artifacts/lane07_ethdrift:/app/artifacts/lane07_ethdrift
      - ./config:/app/config:ro

  hermes-lane08_favdepth:
    <<: *bot-common
    container_name: hermes-lane08_favdepth
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
