[pytest]
# Plugin-local pytest config. Its presence makes this directory the pytest
# rootdir, so plugin test runs do NOT inherit the parent monorepo's
# pyproject.toml addopts (which force `--timeout-method=signal`). SIGALRM is
# POSIX-only and crashes pytest on Windows; keeping the plugin self-contained
# fixes the Windows SIGALRM pytest-timeout failure. If pytest-timeout is
# installed it auto-selects a platform-appropriate method here.
testpaths = tests
addopts = -q
