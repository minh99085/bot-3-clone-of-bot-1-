# Filter profile — switches entry thresholds via MODE_PRESETS in models/config.py
# options: strict | strict_real | moderate | aggressive
#
#   strict       — max WR, fewest trades (legacy extreme_q 0.88/0.12; inflated-q era)
#   strict_real  — high WR with real cex_implied_up as q (edge 0.14, conv 0.93)
#   moderate     — more trades, looser real-q gates (edge 0.085)
#   aggressive   — highest frequency, ~80–83% WR on synthetic
#
# Tip: set mode alone; the preset overwrites the threshold fields below.
mode: strict_real

# --- Active thresholds (mirrored from the selected mode; do not hand-edit
#     unless you also change `mode` or pass CLI --filter-mode) ---
kappa_base: 0.35
kappa_guard: 0.20
max_single_market_pct: 0.08
risk_budget: 0.18

# Hard Bayesian entry filter (selectivity → 80%+ WR when model is calibrated)
# strict_real: real cex_implied_up as q — edge floor near the only profitable
# VPS bucket (≥0.15); tighter conviction + extreme_q than moderate.
min_edge: 0.14
min_conviction: 0.93
min_conviction_guard: 0.96
extreme_q_high: 0.85
extreme_q_low: 0.15
early_exit_conviction: 0.35

# Drawdown / rolling WR guards
dd_guard_pct: 0.08
rolling_wr_window: 20
rolling_wr_floor: 0.75
max_drawdown_hard_pct: 0.15

# Effective sample size by category (Beta prior strength)
n_eff:
  elections: 120
  crypto: 80
  sports: 80
  economics: 100
  default: 70

# Paper / loop
bankroll: 2000.0
slippage_bps_min: 50
slippage_bps_max: 200
loop_interval_seconds: 300
paper_only: true

# Scope: keep Hermes restricted to BTC fast markets in production
scope_btc_updown_only: true

# Backtest — calibrated model noise (Brier target < 0.18)
synthetic_n_markets: 8000
synthetic_seed: 42
brier_noise_calibrated: 0.05
market_noise: 0.16

# Rich synthetic universe
synthetic_n_min: 5000
synthetic_n_max: 20000
decision_fracs: [0.30, 0.60, 0.85]
days_to_res_choices: [3.0, 14.0, 45.0, 120.0]
days_to_res_weights: [0.25, 0.35, 0.25, 0.15]
block_size: 8
block_corr: 0.72
extreme_mass: 0.55
categories: [crypto, elections, sports, economics]

monte_carlo_runs: 100
tune_trials: 40
