# Filter profile — Hermes Agent v3
# options: strict | strict_real | moderate | aggressive
#
#   strict       — legacy max WR (inflated-q era thresholds)
#   strict_real  — high-WR freeze under real cex_implied_up as q
#   moderate     — DEFAULT: safer live exploration (real q, no hallucination push)
#   aggressive   — research frequency profile
#
# Tip: set mode alone; the preset overwrites the threshold fields below.
# Hallucination bug fixed: model q = real cex_implied_up (lightly smoothed),
# never artificially pushed to 0.97 / 0.03.
mode: moderate

# --- Active thresholds (mirrored from the selected mode; do not hand-edit
#     unless you also change `mode` or pass CLI --filter-mode) ---
kappa_base: 0.40
kappa_guard: 0.20
max_single_market_pct: 0.09
risk_budget: 0.20

# Hard Bayesian entry filter — moderate defaults (safer live under real q)
min_edge: 0.085
min_conviction: 0.88
min_conviction_guard: 0.94
extreme_q_high: 0.80
extreme_q_low: 0.20
extreme_anchor: q
extreme_p_high: 0.72
extreme_p_low: 0.28
early_exit_conviction: 0.35

# Drawdown / rolling WR guards
dd_guard_pct: 0.08
rolling_wr_window: 20
rolling_wr_floor: 0.75
max_drawdown_hard_pct: 0.15

# Effective sample size by category (Beta prior strength)
n_eff:
  elections: 120
  crypto: 80
  sports: 80
  economics: 100
  default: 70

# Paper / loop
bankroll: 2000.0
slippage_bps_min: 50
slippage_bps_max: 200
loop_interval_seconds: 300
paper_only: true

# Scope: keep Hermes restricted to BTC fast markets in production
scope_btc_updown_only: true

# Backtest — calibrated model noise (Brier target < 0.18)
synthetic_n_markets: 8000
synthetic_seed: 42
brier_noise_calibrated: 0.05
market_noise: 0.16

# Rich synthetic universe
synthetic_n_min: 5000
synthetic_n_max: 20000
decision_fracs: [0.30, 0.60, 0.85]
days_to_res_choices: [3.0, 14.0, 45.0, 120.0]
days_to_res_weights: [0.25, 0.35, 0.25, 0.15]
block_size: 8
block_corr: 0.72
extreme_mass: 0.55
categories: [crypto, elections, sports, economics]

monte_carlo_runs: 100
tune_trials: 40

# Advanced multi-signal ensemble (Hurst-gated multi-TF + OBI + log-normal + Kalman).
# Defaults keep q quality; thin history → momentum fallback.
# Env HERMES_ADVANCED_SIGNALS=0 disables at runtime without YAML edits.
advanced:
  enabled: true
  swarm_weight: 0.70
  market_blend: 0.30
  tf_windows: [30.0, 60.0, 120.0, 240.0]
  tf_weights: [0.15, 0.20, 0.30, 0.35]
  kalman_process_var: 0.0001
  kalman_measure_var: 0.001
  hurst_window: 60
  garch_alpha: 0.08
  garch_beta: 0.90
  book_levels: 5
  max_conviction_boost: 0.10
